name: Build and Release SpotiFLAC

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Name of the version tag (es: v1.0.0)'
        required: false
        type: string

jobs:
  lint-and-bump:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.commit_and_bump.outputs.NEW_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install .

      - name: Auto-fix with ruff and black
        shell: bash
        run: |
          if command -v ruff >/dev/null 2>&1; then ruff check --fix .; else echo "ruff not installed"; fi
          if command -v black >/dev/null 2>&1; then black .; else echo "black not installed"; fi

      - name: Commit changes and bump version
        id: commit_and_bump
        shell: bash
        run: |
          # 1. Commit delle modifiche di formattazione (se esistono)
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Format changes detected. Committing..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            git add .
            git commit -m "style: auto-fix ruff e black [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No formatting changes detected. Moving straight to versioning."
          fi
          
          # 2. Calcolo del nuovo Tag (Manuale o Automatico)
          USER_INPUT="${{ github.event.inputs.version_tag }}"
          if [[ -n "$USER_INPUT" ]]; then
            echo "Using manually provided tag: $USER_INPUT"
            NEW_TAG="$USER_INPUT"
          else
            # Recupera i tag per far funzionare correttamente 'git describe'
            git fetch --tags
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            
            if [[ $LATEST_TAG =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
              
              NEW_PATCH=$((PATCH + 1))
              NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
              echo "Auto-bumping from $LATEST_TAG to $NEW_TAG"
            else
              NEW_TAG="v1.0.1" 
              echo "Regex failed on $LATEST_TAG. Falling back to default: $NEW_TAG"
            fi
          fi
          
          # 3. Creazione e Push del Tag
          # Se il tag esiste già (es. input manuale già usato), forziamo l'aggiornamento all'ultimo commit
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists. Moving it to the current commit..."
            git tag -f "$NEW_TAG"
            git push origin -f "$NEW_TAG"
          else
            echo "Creating new tag: $NEW_TAG"
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi
          
          # 4. Output per il job di Release
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_OUTPUT

  build:
    needs: lint-and-bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x86_64
            artifact_name: SpotiFLAC-Windows.exe
            build_name: SpotiFLAC-Windows

          - os: macos-latest
            arch: x86_64
            artifact_name: SpotiFLAC-macOS
            build_name: SpotiFLAC-macOS

          - os: ubuntu-latest
            arch: x86_64
            artifact_name: SpotiFLAC-Linux-x86_64
            build_name: SpotiFLAC-Linux-x86_64

          - os: ubuntu-latest
            arch: arm64
            artifact_name: SpotiFLAC-Linux-arm64
            build_name: SpotiFLAC-Linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      if: matrix.arch == 'x86_64'
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies (x86_64 / macOS / Linux)
      if: matrix.arch == 'x86_64'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller certifi requests mutagen
        pip install .

    - name: Build SpotiFLAC (x86_64 / macOS / Linux)
      if: matrix.arch == 'x86_64'
      shell: bash
      run: |
        cd SpotiFLAC
        pyinstaller --onefile --name "${{ matrix.build_name }}" --console ../launcher.py

    - name: Setup QEMU for ARM64
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Build ARM64 Linux via Docker
      if: matrix.arch == 'arm64'
      shell: bash
      run: |
        docker run --rm --platform linux/arm64 \
          -v "$PWD":/workspace \
          -w /workspace python:3.12-bullseye \
          bash -c "
            pip install --upgrade pip && \
            pip install pyinstaller certifi requests mutagen && \
            pip install . && \
            cd SpotiFLAC && \
            pyinstaller --onefile --name '${{ matrix.build_name }}' --console ../launcher.py
          "

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: bin-${{ matrix.build_name }}
        path: SpotiFLAC/dist/${{ matrix.artifact_name }}
        retention-days: 7

  release:
      needs: [lint-and-bump, build]
      runs-on: ubuntu-latest
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
      
      steps:
        - name: Download all build artifacts
          uses: actions/download-artifact@v4
          with:
            pattern: bin-*
            path: release-files
            merge-multiple: true

        - name: Create GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ needs.lint-and-bump.outputs.release_tag }}
            files: release-files/*
            draft: true
            prerelease: false
            body: |
              ## Changelog
              
              *(Adicione as novidades da versão aqui)*
              ### WORKING APIs

              ## Downloads
              
              [![Windows](https://img.shields.io/badge/Windows-[SPOTIFLAC.EXE]-0078D6?style=for-the-badge&logo=data:image/svg+xml;base64,)](https://github.com/${{ github.repository }}/releases/download/${{ needs.lint-and-bump.outputs.release_tag }}/SpotiFLAC-Windows.exe) [![macOS](https://img.shields.io/badge/macOS-[SPOTIFLAC--macos]-000000?style=for-the-badge&logo=apple&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/${{ needs.lint-and-bump.outputs.release_tag }}/SpotiFLAC-macOS) [![Linux](https://img.shields.io/badge/Linux-[SPOTIFLAC--linux]-FFB300?style=for-the-badge&logo=linux&logoColor=black)](https://github.com/${{ github.repository }}/releases/download/${{ needs.lint-and-bump.outputs.release_tag }}/SpotiFLAC-Linux-x86_64)

              <details>
              <summary><b>💻 Usage Instructions</b></summary>
              
              ### Windows (PowerShell ou CMD)
              ```cmd
              SpotiFLAC-Windows.exe [https://open.spotify.com/track/](https://open.spotify.com/track/)... ./out --service tidal
              ```

              ### 🍏 macOS
              ```bash
              chmod +x SpotiFLAC-macOS
              ./SpotiFLAC-macOS [https://open.spotify.com/track/](https://open.spotify.com/track/)... ./out --service tidal
              ```

              ### 🐧 Linux
              ```bash
              chmod +x SpotiFLAC-Linux-x86_64
              ./SpotiFLAC-Linux-x86_64 [https://open.spotify.com/track/](https://open.spotify.com/track/)... ./out --service tidal
              ```
              *(For ARM devices like Raspberry Pi, replace `x86_64` with `arm64`)*
              </details>
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}